post:
  summary: Create target
  operationId: createTarget
  responses:
    '201':
      description: Successful response
      content:
        application/json:
          schema:
            $ref: ../components/schemas.yaml#/Target
    '400':
      description: Bad request
      content:
        application/json:
          schema:
            $ref: ../components/schemas.yaml#/Error
    '401':
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: ../components/schemas.yaml#/Error
    '403':
      description: Forbidden
      content:
        application/json:
          schema:
            $ref: ../components/schemas.yaml#/Error
    '404':
      description: Not found
      content:
        application/json:
          schema:
            $ref: ../components/schemas.yaml#/Error
    '409':
      description: Conflict
      content:
        application/json:
          schema:
            $ref: ../components/schemas.yaml#/Error
  tags:
  - Targets
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: ../components/schemas.yaml#/CreateTargetRequest
get:
  summary: List targets
  operationId: listTargets
  responses:
    '200':
      description: Successful response
      content:
        application/json:
          schema:
            $ref: ../components/schemas.yaml#/TargetListResponse
    '400':
      description: Bad request
      content:
        application/json:
          schema:
            $ref: ../components/schemas.yaml#/Error
    '401':
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: ../components/schemas.yaml#/Error
    '403':
      description: Forbidden
      content:
        application/json:
          schema:
            $ref: ../components/schemas.yaml#/Error
    '404':
      description: Not found
      content:
        application/json:
          schema:
            $ref: ../components/schemas.yaml#/Error
    '409':
      description: Conflict
      content:
        application/json:
          schema:
            $ref: ../components/schemas.yaml#/Error
  tags:
  - Targets
  parameters:
  - name: target_type
    in: query
    required: false
    schema:
      type: string
  - name: address_kind
    in: query
    required: false
    schema:
      type: string
  - name: label
    in: query
    required: false
    schema:
      type: string
  - name: collection_id
    in: query
    required: false
    schema:
      type: string
  - name: bbox
    in: query
    required: false
    schema:
      type: string
    description: Comma-separated min_lat,min_lng,max_lat,max_lng
  - name: time_start
    in: query
    required: false
    schema:
      type: string
      format: date-time
  - name: time_end
    in: query
    required: false
    schema:
      type: string
      format: date-time
  - name: updated_after
    in: query
    required: false
    schema:
      type: string
      format: date-time
  - name: visibility
    in: query
    required: false
    schema:
      type: string
  - name: domain_pack
    in: query
    required: false
    schema:
      type: string
  - name: cursor
    in: query
    required: false
    schema:
      type: string
  - name: limit
    in: query
    required: false
    schema:
      type: integer
      minimum: 1
      maximum: 500
