delete:
  summary: End current session
  operationId: deleteCurrentSession
  responses:
    '204':
      description: No content
    '400':
      description: Bad request
      content:
        application/json:
          schema:
            $ref: ../components/schemas.yaml#/Error
    '401':
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: ../components/schemas.yaml#/Error
    '403':
      description: Forbidden
      content:
        application/json:
          schema:
            $ref: ../components/schemas.yaml#/Error
    '404':
      description: Not found
      content:
        application/json:
          schema:
            $ref: ../components/schemas.yaml#/Error
    '409':
      description: Conflict
      content:
        application/json:
          schema:
            $ref: ../components/schemas.yaml#/Error
  tags:
  - Authority
