post:
  summary: Create vocabulary
  operationId: createVocabulary
  responses:
    '201':
      description: Successful response
      content:
        application/json:
          schema:
            $ref: ../components/schemas.yaml#/Vocabulary
    '400':
      description: Bad request
      content:
        application/json:
          schema:
            $ref: ../components/schemas.yaml#/Error
    '401':
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: ../components/schemas.yaml#/Error
    '403':
      description: Forbidden
      content:
        application/json:
          schema:
            $ref: ../components/schemas.yaml#/Error
    '404':
      description: Not found
      content:
        application/json:
          schema:
            $ref: ../components/schemas.yaml#/Error
    '409':
      description: Conflict
      content:
        application/json:
          schema:
            $ref: ../components/schemas.yaml#/Error
  tags:
  - Configuration
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: ../components/schemas.yaml#/CreateVocabularyRequest
get:
  summary: List vocabularies
  operationId: listVocabularies
  responses:
    '200':
      description: Successful response
      content:
        application/json:
          schema:
            $ref: ../components/schemas.yaml#/VocabularyListResponse
    '400':
      description: Bad request
      content:
        application/json:
          schema:
            $ref: ../components/schemas.yaml#/Error
    '401':
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: ../components/schemas.yaml#/Error
    '403':
      description: Forbidden
      content:
        application/json:
          schema:
            $ref: ../components/schemas.yaml#/Error
    '404':
      description: Not found
      content:
        application/json:
          schema:
            $ref: ../components/schemas.yaml#/Error
    '409':
      description: Conflict
      content:
        application/json:
          schema:
            $ref: ../components/schemas.yaml#/Error
  tags:
  - Configuration
  parameters:
  - name: scope
    in: query
    required: false
    schema:
      type: string
  - name: cursor
    in: query
    required: false
    schema:
      type: string
  - name: limit
    in: query
    required: false
    schema:
      type: integer
      minimum: 1
      maximum: 500
