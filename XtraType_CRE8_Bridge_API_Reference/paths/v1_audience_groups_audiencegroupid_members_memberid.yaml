delete:
  summary: Remove audience member
  operationId: removeAudienceMember
  responses:
    '204':
      description: No content
    '400':
      description: Bad request
      content:
        application/json:
          schema:
            $ref: ../components/schemas.yaml#/Error
    '401':
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: ../components/schemas.yaml#/Error
    '403':
      description: Forbidden
      content:
        application/json:
          schema:
            $ref: ../components/schemas.yaml#/Error
    '404':
      description: Not found
      content:
        application/json:
          schema:
            $ref: ../components/schemas.yaml#/Error
    '409':
      description: Conflict
      content:
        application/json:
          schema:
            $ref: ../components/schemas.yaml#/Error
  tags:
  - Audience
  parameters:
  - name: audienceGroupId
    in: path
    required: true
    schema:
      type: string
    description: Audience group identifier
  - name: memberId
    in: path
    required: true
    schema:
      type: string
    description: Membership identifier
