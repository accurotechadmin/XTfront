Id:
  type: string
  description: Stable identifier, preferably ULID or prefixed ULID.
Timestamp:
  type: string
  format: date-time
JsonObject:
  type: object
  additionalProperties: true
PaginationMeta:
  type: object
  properties:
    cursor:
      type:
      - string
      - 'null'
    next_cursor:
      type:
      - string
      - 'null'
    limit:
      type: integer
      minimum: 1
      maximum: 500
    has_more:
      type: boolean
  required:
  - limit
  - has_more
Error:
  type: object
  properties:
    error:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: object
          additionalProperties: true
      required:
      - code
      - message
  required:
  - error
MutationMeta:
  type: object
  properties:
    client_mutation_id:
      type: string
    idempotency_key:
      type: string
    if_revision:
      type: integer
      minimum: 0
ActorIdentity:
  type: object
  properties:
    actor_id:
      $ref: '#/Id'
    key_id:
      oneOf:
      - $ref: '#/Id'
      - type: 'null'
    display_name:
      type:
      - string
      - 'null'
  required:
  - actor_id
PermissionSummary:
  type: object
  properties:
    can_view:
      type: boolean
    can_edit:
      type: boolean
    can_comment:
      type: boolean
    can_review:
      type: boolean
    can_publish:
      type: boolean
  required:
  - can_view
  - can_edit
  - can_comment
  - can_review
  - can_publish
Visibility:
  type: object
  properties:
    visibility_class:
      type: string
      enum:
      - private
      - workspace
      - restricted_group
      - review_only
      - link_shared
      - public
      - layer_specific
    audience_group_ids:
      type: array
      items:
        $ref: '#/Id'
    inheritance_mode:
      type: string
      enum:
      - local
      - inherited
      - overridden
  required:
  - visibility_class
WorkflowState:
  type: object
  properties:
    draft_state:
      type: string
      enum:
      - draft_saved
      - draft_enriched
      - ready_for_review
    review_state:
      type: string
      enum:
      - none
      - pending
      - in_review
      - reviewed
    moderation_state:
      type: string
      enum:
      - none
      - flagged
      - restricted
      - moderated
    resolution_state:
      type: string
      enum:
      - open
      - resolved
      - superseded
    publication_state:
      type: string
      enum:
      - private
      - staged
      - published
      - embedded
      - archived
    assignment:
      type: object
      properties:
        assignee_actor_id:
          oneOf:
          - $ref: '#/Id'
          - type: 'null'
        assignee_group_id:
          oneOf:
          - $ref: '#/Id'
          - type: 'null'
        queue_id:
          oneOf:
          - $ref: '#/Id'
          - type: 'null'
TrustState:
  type: object
  properties:
    confidence:
      type: string
      enum:
      - low
      - medium
      - high
    verification:
      type: string
      enum:
      - unverified
      - under_review
      - verified
      - rejected
    dispute:
      type: string
      enum:
      - none
      - contested
      - disputed
    quality:
      type: string
      enum:
      - rough
      - usable
      - polished
    sensitivity:
      type: string
      enum:
      - normal
      - sensitive
      - restricted
Provenance:
  type: object
  properties:
    creation_mode:
      type: string
      enum:
      - captured
      - asserted
      - imported
      - inferred
      - reviewed
    capture_surface:
      type:
      - string
      - 'null'
    technical_capture_metadata:
      type: object
      additionalProperties: true
    integrity_metadata:
      type: object
      additionalProperties: true
    suggestion_provenance:
      type: object
      additionalProperties: true
    transformation_provenance:
      type: object
      additionalProperties: true
ObjectRef:
  type: object
  properties:
    kind:
      type: string
      enum:
      - owner
      - actor
      - key
      - target
      - entry
      - comment
      - relationship
      - collection
      - source
      - publication
      - overlay
      - template
      - vocabulary
      - live_room
    id:
      $ref: '#/Id'
  required:
  - kind
  - id
DomainEnvelope:
  type: object
  properties:
    id:
      $ref: '#/Id'
    object_kind:
      type: string
    object_type:
      type: string
    schema_version:
      type: string
    realm_id:
      $ref: '#/Id'
    created_at:
      $ref: '#/Timestamp'
    updated_at:
      $ref: '#/Timestamp'
    created_by:
      $ref: '#/ActorIdentity'
    revision:
      type: integer
      minimum: 0
    permissions:
      $ref: '#/PermissionSummary'
    data:
      type: object
      additionalProperties: true
  required:
  - id
  - object_kind
  - object_type
  - schema_version
  - realm_id
  - created_at
  - updated_at
  - revision
  - permissions
  - data
Owner:
  type: object
  properties:
    owner_id:
      $ref: '#/Id'
    realm_id:
      $ref: '#/Id'
    username:
      type: string
    email:
      type: string
      format: email
    display_name:
      type:
      - string
      - 'null'
    status:
      type: string
      enum:
      - active
      - pending
      - suspended
    created_at:
      $ref: '#/Timestamp'
  required:
  - owner_id
  - realm_id
  - username
  - email
  - status
  - created_at
CreateOwnerRequest:
  allOf:
  - $ref: '#/MutationMeta'
  - type: object
    properties:
      username:
        type: string
      password:
        type: string
        minLength: 8
      email:
        type: string
        format: email
      payment_token:
        type: string
      display_name:
        type: string
    required:
    - username
    - password
    - email
    - payment_token
Session:
  type: object
  properties:
    session_id:
      $ref: '#/Id'
    actor:
      $ref: '#/ActorIdentity'
    realm_id:
      $ref: '#/Id'
    access_token:
      type: string
    refresh_token:
      type: string
    expires_at:
      $ref: '#/Timestamp'
    effective_permissions:
      type: array
      items:
        type: string
    keychain_id:
      oneOf:
      - $ref: '#/Id'
      - type: 'null'
  required:
  - session_id
  - actor
  - realm_id
  - access_token
  - expires_at
  - effective_permissions
OwnerLoginRequest:
  allOf:
  - $ref: '#/MutationMeta'
  - type: object
    properties:
      username_or_email:
        type: string
      password:
        type: string
    required:
    - username_or_email
    - password
DisplayProfile:
  type: object
  properties:
    display_name:
      type: string
    avatar_url:
      type:
      - string
      - 'null'
      format: uri
KeySessionRequest:
  allOf:
  - $ref: '#/MutationMeta'
  - type: object
    properties:
      key_token:
        type: string
      display_profile:
        $ref: '#/DisplayProfile'
    required:
    - key_token
KeychainSessionRequest:
  allOf:
  - $ref: '#/MutationMeta'
  - type: object
    properties:
      key_tokens:
        type: array
        items:
          type: string
        minItems: 1
    required:
    - key_tokens
RefreshSessionRequest:
  allOf:
  - $ref: '#/MutationMeta'
  - type: object
    properties:
      refresh_token:
        type: string
    required:
    - refresh_token
ActorProfile:
  type: object
  properties:
    actor_id:
      $ref: '#/Id'
    realm_id:
      $ref: '#/Id'
    display_name:
      type:
      - string
      - 'null'
    avatar_url:
      type:
      - string
      - 'null'
      format: uri
    session:
      $ref: '#/Session'
    effective_roles:
      type: array
      items:
        type: string
    effective_permissions:
      type: array
      items:
        type: string
    authority_chain:
      type: array
      items:
        type: string
    default_domain_pack:
      type:
      - string
      - 'null'
    default_capture_settings:
      type: object
      additionalProperties: true
  required:
  - actor_id
  - realm_id
  - effective_roles
  - effective_permissions
  - authority_chain
KeyConstraints:
  type: object
  properties:
    expires_at:
      oneOf:
      - $ref: '#/Timestamp'
      - type: 'null'
    max_uses:
      type:
      - integer
      - 'null'
      minimum: 1
    domain_pack_allowlist:
      type: array
      items:
        type: string
    entry_type_allowlist:
      type: array
      items:
        type: string
    collection_scope_ids:
      type: array
      items:
        $ref: '#/Id'
    audience_scope_ids:
      type: array
      items:
        $ref: '#/Id'
    publish_allowed:
      type: boolean
    review_allowed:
      type: boolean
Key:
  type: object
  properties:
    key_id:
      $ref: '#/Id'
    realm_id:
      $ref: '#/Id'
    key_type:
      type: string
      enum:
      - primary_author
      - secondary_author
      - use
    label:
      type: string
    description:
      type:
      - string
      - 'null'
    grants:
      type: array
      items:
        type: string
    constraints:
      $ref: '#/KeyConstraints'
    status:
      type: string
      enum:
      - active
      - revoked
      - expired
    minted_by_owner_id:
      oneOf:
      - $ref: '#/Id'
      - type: 'null'
    minted_by_key_id:
      oneOf:
      - $ref: '#/Id'
      - type: 'null'
    delegation_depth:
      type: integer
      minimum: 0
    authority_chain:
      type: array
      items:
        type: string
    created_at:
      $ref: '#/Timestamp'
  required:
  - key_id
  - realm_id
  - key_type
  - label
  - grants
  - status
  - delegation_depth
  - authority_chain
  - created_at
CreateKeyRequest:
  allOf:
  - $ref: '#/MutationMeta'
  - type: object
    properties:
      key_type:
        type: string
        enum:
        - primary_author
        - secondary_author
        - use
      label:
        type: string
      description:
        type: string
      grants:
        type: array
        items:
          type: string
      constraints:
        $ref: '#/KeyConstraints'
    required:
    - key_type
    - label
    - grants
UpdateKeyRequest:
  allOf:
  - $ref: '#/MutationMeta'
  - type: object
    properties:
      label:
        type: string
      description:
        type: string
      grants:
        type: array
        items:
          type: string
      constraints:
        $ref: '#/KeyConstraints'
RevokeRequest:
  allOf:
  - $ref: '#/MutationMeta'
  - type: object
    properties:
      reason:
        type: string
    required:
    - reason
RotateKeyRequest:
  allOf:
  - $ref: '#/MutationMeta'
  - type: object
    properties:
      invalidate_old_after:
        oneOf:
        - $ref: '#/Timestamp'
        - type: 'null'
Keychain:
  type: object
  properties:
    keychain_id:
      $ref: '#/Id'
    label:
      type: string
    key_ids:
      type: array
      items:
        $ref: '#/Id'
    effective_grants:
      type: array
      items:
        type: string
    conflicting_grants:
      type: array
      items:
        type: string
    narrowed_scopes:
      type: array
      items:
        type: string
    created_at:
      $ref: '#/Timestamp'
  required:
  - keychain_id
  - label
  - key_ids
  - effective_grants
  - conflicting_grants
  - narrowed_scopes
  - created_at
CreateKeychainRequest:
  allOf:
  - $ref: '#/MutationMeta'
  - type: object
    properties:
      label:
        type: string
      key_ids:
        type: array
        items:
          $ref: '#/Id'
        minItems: 1
    required:
    - label
    - key_ids
UpdateKeychainRequest:
  allOf:
  - $ref: '#/MutationMeta'
  - type: object
    properties:
      label:
        type: string
      key_ids:
        type: array
        items:
          $ref: '#/Id'
AddKeyToKeychainRequest:
  allOf:
  - $ref: '#/MutationMeta'
  - type: object
    properties:
      key_id:
        $ref: '#/Id'
    required:
    - key_id
AudienceGroup:
  type: object
  properties:
    audience_group_id:
      $ref: '#/Id'
    name:
      type: string
    description:
      type:
      - string
      - 'null'
    join_mode:
      type: string
      enum:
      - open
      - invite
      - request
      - key_only
    default_notifications:
      type: boolean
    member_count:
      type: integer
      minimum: 0
    created_at:
      $ref: '#/Timestamp'
  required:
  - audience_group_id
  - name
  - join_mode
  - default_notifications
  - member_count
  - created_at
CreateAudienceGroupRequest:
  allOf:
  - $ref: '#/MutationMeta'
  - type: object
    properties:
      name:
        type: string
      description:
        type: string
      join_mode:
        type: string
        enum:
        - open
        - invite
        - request
        - key_only
      default_notifications:
        type: boolean
    required:
    - name
    - join_mode
UpdateAudienceGroupRequest:
  allOf:
  - $ref: '#/MutationMeta'
  - type: object
    properties:
      name:
        type: string
      description:
        type: string
      join_mode:
        type: string
        enum:
        - open
        - invite
        - request
        - key_only
      default_notifications:
        type: boolean
AddAudienceMembersRequest:
  allOf:
  - $ref: '#/MutationMeta'
  - type: object
    properties:
      actors:
        type: array
        items:
          $ref: '#/Id'
      keys:
        type: array
        items:
          $ref: '#/Id'
      emails:
        type: array
        items:
          type: string
          format: email
      role:
        type: string
        enum:
        - member
        - manager
        - viewer
    required:
    - role
SubscriptionRequest:
  allOf:
  - $ref: '#/MutationMeta'
  - type: object
    properties:
      notification_mode:
        type: string
        enum:
        - default
        - 'off'
        - important_only
        - all
BootstrapResponse:
  type: object
  properties:
    actor:
      $ref: '#/ActorProfile'
    effective_permissions:
      type: array
      items:
        type: string
    domain_packs:
      type: array
      items:
        type: string
    target_types:
      type: array
      items:
        type: string
    entry_types:
      type: array
      items:
        type: string
    intent_catalog:
      type: array
      items:
        type: string
    workflow_states:
      $ref: '#/WorkflowState'
    visibility_states:
      type: array
      items:
        type: string
    trust_vocab:
      $ref: '#/TrustState'
    templates_summary:
      type: array
      items:
        type: object
        additionalProperties: true
    vocabulary_summary:
      type: array
      items:
        type: object
        additionalProperties: true
    feature_flags:
      type: object
      additionalProperties:
        type: boolean
    frontend_capability_flags:
      type: object
      additionalProperties:
        type: boolean
    upload_configuration:
      type: object
      additionalProperties: true
    realtime:
      type: object
      additionalProperties: true
    overlay_support:
      type: object
      additionalProperties: true
  required:
  - actor
  - effective_permissions
  - domain_packs
  - target_types
  - entry_types
  - intent_catalog
CapabilitiesResponse:
  type: object
  properties:
    can_create_targets:
      type: boolean
    can_create_entries:
      type: array
      items:
        type: string
    can_comment:
      type: boolean
    can_publish:
      type: boolean
    can_review:
      type: boolean
    can_manage_templates:
      type: boolean
    can_manage_vocabularies:
      type: boolean
    can_use_overlay:
      type: boolean
    can_use_map_view:
      type: boolean
  required:
  - can_create_targets
  - can_create_entries
  - can_comment
  - can_publish
  - can_review
  - can_manage_templates
  - can_manage_vocabularies
  - can_use_overlay
  - can_use_map_view
TargetAddress:
  oneOf:
  - type: object
    properties:
      kind:
        type: string
        const: url
      url:
        type: string
        format: uri
      canonical_url:
        type:
        - string
        - 'null'
        format: uri
      title:
        type:
        - string
        - 'null'
      selector:
        type: object
        properties:
          quote:
            type:
            - string
            - 'null'
          text_position:
            type: object
            properties:
              start:
                type: integer
              end:
                type: integer
          dom_selector:
            type:
            - string
            - 'null'
    required:
    - kind
    - url
  - type: object
    properties:
      kind:
        type: string
        const: geo
      lat:
        type: number
      lng:
        type: number
      radius_m:
        type:
        - number
        - 'null'
    required:
    - kind
    - lat
    - lng
  - type: object
    properties:
      kind:
        type: string
        const: interval
      start:
        $ref: '#/Timestamp'
      end:
        oneOf:
        - $ref: '#/Timestamp'
        - type: 'null'
    required:
    - kind
    - start
  - type: object
    properties:
      kind:
        type: string
        const: entity_ref
      entity_type:
        type: string
        enum:
        - person
        - organization
        - device
        - species
        - concept
      external_ids:
        type: object
        additionalProperties:
          type: string
    required:
    - kind
    - entity_type
  - type: object
    properties:
      kind:
        type: string
        const: object_ref
      object_class:
        type: string
        enum:
        - vehicle
        - artifact
        - tool
        - asset
      serial_number:
        type:
        - string
        - 'null'
      tag_code:
        type:
        - string
        - 'null'
    required:
    - kind
    - object_class
  - type: object
    properties:
      kind:
        type: string
        const: composite
      parts:
        type: array
        items:
          oneOf:
          - $ref: '#/ObjectRef'
          - type: object
            additionalProperties: true
    required:
    - kind
    - parts
  - type: object
    properties:
      kind:
        type: string
        const: quote_anchor
      quote:
        type: string
    required:
    - kind
    - quote
Target:
  allOf:
  - $ref: '#/DomainEnvelope'
  - type: object
    properties:
      object_kind:
        type: string
        const: target
      object_type:
        type: string
      data:
        type: object
        properties:
          target_type:
            type: string
            enum:
            - digital_resource
            - spatial
            - temporal
            - named_entity
            - abstract_logical
            - object_memory
            - composite
          label:
            type: string
          summary:
            type:
            - string
            - 'null'
          addresses:
            type: array
            items:
              $ref: '#/TargetAddress'
          aliases:
            type: array
            items:
              type: string
          metadata:
            type: object
            additionalProperties: true
          domain_pack:
            type:
            - string
            - 'null'
          provenance:
            $ref: '#/Provenance'
          visibility:
            $ref: '#/Visibility'
          trust:
            $ref: '#/TrustState'
          relationships:
            type: array
            items:
              $ref: '#/Id'
        required:
        - target_type
        - label
        - addresses
CreateTargetRequest:
  allOf:
  - $ref: '#/MutationMeta'
  - type: object
    properties:
      target_type:
        type: string
        enum:
        - digital_resource
        - spatial
        - temporal
        - named_entity
        - abstract_logical
        - object_memory
        - composite
      label:
        type: string
      summary:
        type: string
      addresses:
        type: array
        items:
          $ref: '#/TargetAddress'
      context:
        type: object
        additionalProperties: true
      provenance:
        $ref: '#/Provenance'
    required:
    - target_type
    - label
    - addresses
ResolveTargetRequest:
  allOf:
  - $ref: '#/MutationMeta'
  - type: object
    properties:
      target_type:
        type: string
        enum:
        - digital_resource
        - spatial
        - temporal
        - named_entity
        - abstract_logical
        - object_memory
        - composite
      addresses:
        type: array
        items:
          $ref: '#/TargetAddress'
      dedupe_mode:
        type: string
        enum:
        - strict
        - fuzzy
        - upsert
    required:
    - target_type
    - addresses
    - dedupe_mode
ResolveTargetResponse:
  type: object
  properties:
    target_id:
      $ref: '#/Id'
    status:
      type: string
      enum:
      - matched
      - created
      - merged
  required:
  - target_id
  - status
BulkResolveTargetRequest:
  allOf:
  - $ref: '#/MutationMeta'
  - type: object
    properties:
      operations:
        type: array
        items:
          $ref: '#/ResolveTargetRequest'
        minItems: 1
    required:
    - operations
BulkResolveTargetResponse:
  type: object
  properties:
    results:
      type: array
      items:
        $ref: '#/ResolveTargetResponse'
  required:
  - results
TargetMergeRequest:
  allOf:
  - $ref: '#/MutationMeta'
  - type: object
    properties:
      source_target_ids:
        type: array
        items:
          $ref: '#/Id'
        minItems: 1
      strategy:
        type: string
        enum:
        - merge_into_current
        - merge_current_into_other
    required:
    - source_target_ids
    - strategy
TargetAliasRequest:
  allOf:
  - $ref: '#/MutationMeta'
  - type: object
    properties:
      alias:
        type: string
    required:
    - alias
TargetSupersedeRequest:
  allOf:
  - $ref: '#/MutationMeta'
  - type: object
    properties:
      replacement_target_id:
        $ref: '#/Id'
    required:
    - replacement_target_id
EntryBlock:
  oneOf:
  - type: object
    properties:
      block_type:
        type: string
        const: paragraph
      text:
        type: string
    required:
    - block_type
    - text
  - type: object
    properties:
      block_type:
        type: string
        const: quote
      text:
        type: string
      source_ref:
        $ref: '#/Id'
    required:
    - block_type
    - text
  - type: object
    properties:
      block_type:
        type: string
        const: citation
      citation_style:
        type: string
        enum:
        - url
        - manual
        - doi
      source_ref:
        $ref: '#/Id'
    required:
    - block_type
