openapi: 3.1.0
info:
  title: XtraType on CRE8 Bridge API
  version: 0.1.0-draft
  summary: OpenAPI-style bridge contract for the XtraType frontend on top of the CRE8
    authority platform.
  description: This specification models CRE8 as the authority plane and XtraType
    as a typed contextual-record domain plane. It intentionally does not expose raw
    CRE8 Post semantics as the frontend contract. WebSocket / realtime events are
    noted under `x-realtime-events`, but not fully modeled as native OpenAPI paths.
servers:
- url: https://api.example.com
  description: Production
- url: https://staging-api.example.com
  description: Staging
security:
- bearerAuth: []
tags:
- name: Authority
  description: Owners, sessions, and actor bootstrap.
- name: Keys
  description: Primary author keys, secondary author keys, use keys, and keychains.
- name: Audience
  description: Audience groups and subscriptions.
- name: Bootstrap
  description: Frontend bootstrap and capability payloads.
- name: Targets
  description: Target lifecycle and target resolution APIs.
- name: Entries
  description: Typed XtraType entries.
- name: Comments
  description: Conversational comments.
- name: Capture
  description: Capture entrypoints for browser, mobile, import, voice, scan, and AR.
- name: Sources
  description: Source records and imported artifacts.
- name: Evidence
  description: Evidence packets, chains, and support attachments.
- name: Relationships
  description: Typed object relationships.
- name: Collections
  description: Collections and membership.
- name: Views
  description: Lenses and projection queries.
- name: Governance
  description: Workflow, review, moderation, routing, visibility, provenance, and
    trust.
- name: Sharing
  description: Share tokens and links.
- name: Configuration
  description: Domain packs, templates, vocabularies, and schema proposals.
- name: Suggestions
  description: Explainable automation and suggestion APIs.
- name: Search
  description: Search and view projection queries.
- name: Media
  description: Upload and media processing.
- name: Activity
  description: Activity feeds and audit log.
- name: Live
  description: Live rooms and collaboration presence.
- name: Publication
  description: Publications, overlays, and public-facing projections.
- name: Public
  description: Unauthenticated public endpoints.
- name: Composer
  description: Adaptive composer convenience endpoints.
- name: Batch
  description: Mixed-object hydration and permission resolution.
x-realtime-events:
- entry.updated
- comment.created
- relationship.created
- review.assigned
- moderation.changed
- publication.changed
- overlay.updated
- presence.updated
- audience.subscription_changed
